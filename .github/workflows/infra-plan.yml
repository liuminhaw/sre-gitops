name: infra-plan

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    environment: ${{ matrix.env }}
    permissions:
      contents: read
      id-token: write
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init/plan (${{ matrix.env }})
        working-directory: infra/live/${{ matrix.env }}
        run: |
          terraform fmt -check -recursive
          terraform init -input=false
          terraform validate
          set -o pipefail
          terraform plan -no-color -input=false 2>&1 | tee "${GITHUB_WORKSPACE}/tfplan-${{ matrix.env }}.txt"
          exit ${PIPESTATUS[0]}

      - name: Upload plan output (${{ matrix.env }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: tfplan-${{ matrix.env }}.txt
          retention-days: 7

  comment:
    runs-on: ubuntu-latest
    needs: [plan]
    if: always() && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Download plan outputs
        uses: actions/download-artifact@v4
        with:
          pattern: tfplan-*
          path: tfplans
          merge-multiple: true

      - name: Build PR comment
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Terraform plan"
            echo
            echo "_Workflow:_ \`${GITHUB_WORKFLOW}\`  \`#${GITHUB_RUN_NUMBER}\`"
            echo
          } > comment.md

          shopt -s nullglob
          files=(tfplans/tfplan-*.txt)
          if [ ${#files[@]} -eq 0 ]; then
            {
              echo "> No plan artifacts were found."
            } >> comment.md
          else
            for f in "${files[@]}"; do
              env_name="$(basename "$f")"
              env_name="${env_name#tfplan-}"
              env_name="${env_name%.txt}"
              {
                echo "<details><summary><strong>${env_name}</strong></summary>"
                echo
                echo '```'
                cat "$f"
                echo '```'
                echo
                echo "</details>"
                echo
              } >> comment.md
            done
          fi

          max_bytes=64000
          bytes="$(wc -c < comment.md | tr -d ' ')"
          if [ "${bytes}" -gt "${max_bytes}" ]; then
            tmp="$(mktemp)"
            head -c "${max_bytes}" comment.md > "${tmp}"
            {
              echo
              echo
              echo "_Comment truncated to ${max_bytes} bytes._"
            } >> "${tmp}"
            mv "${tmp}" comment.md
          fi

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-identifier: terraform-plan
          body-path: comment.md
